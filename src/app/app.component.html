<div class="app-container">

  <header class="app-header">
    <h1>Task Manager</h1>
    <p class="task-summary">{{ taskSummary }}</p>
  </header>

  <!-- Add Task Form -->
  <section class="add-task-section">
    <h2>Add New Task</h2>
    <form [formGroup]="addTaskForm" (ngSubmit)="addTask()">

      <div class="form-row">
        <div class="form-group">
          <label for="newTitle">Task Title *</label>
          <input
            id="newTitle"
            type="text"
            formControlName="title"
            class="form-control"
            placeholder="Enter task title"
            [class.is-invalid]="addTaskForm.get('title')?.invalid && addTaskForm.get('title')?.touched" />
          <div class="error-message"
            *ngIf="addTaskForm.get('title')?.invalid && addTaskForm.get('title')?.touched">
            Title is required.
          </div>
        </div>

        <div class="form-group">
          <label for="newDescription">Description</label>
          <input
            id="newDescription"
            type="text"
            formControlName="description"
            class="form-control"
            placeholder="Optional description" />
        </div>

        <div class="form-group form-group-btn">
          <button
            type="submit"
            class="btn btn-primary"
            [disabled]="addTaskForm.invalid">
            Add Task
          </button>
        </div>
      </div>

    </form>
  </section>

  <!-- Filter -->
  <section class="filter-section">
    <label>Filter by Status:</label>
    <div class="filter-buttons">
      <button
        *ngFor="let status of statuses"
        class="btn btn-filter"
        [class.active]="filterStatus === status"
        (click)="filterStatus = status">
        {{ status }}
      </button>
    </div>
  </section>

  <!-- Task List -->
  <section class="task-list-section">
    <div *ngIf="filteredTasks.length === 0" class="empty-state">
      No tasks found. Add one above to get started.
    </div>

    <app-task
      *ngFor="let task of filteredTasks"
      [task]="task"
      (taskUpdated)="onTaskUpdated($event)"
      (taskDeleted)="onTaskDeleted($event)">
    </app-task>
  </section>

</div>
